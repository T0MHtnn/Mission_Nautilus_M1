<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Mission Nautilus - Confidentiel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css"
        integrity="sha384-X38yfunGUhNzHpBaEBsWLO+A0HDYOQi8ufWDkZ0k9e0eXz/tH3II7uKZ9msv++Ls" crossorigin="anonymous">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body class="b">
    <header>
        <h1>Mission Nautilus</h1>
        <h1 class="elanor">Confidentiel</span></h1>
    </header>

    <section>
        <h2>Position</h2>
        <div class="content">
            <form onsubmit="return false;" class="pure-form">
                <fieldset style="display: flow-root;">
                    <label for="lat" class="first">Lattitude </label> <input type="text" id="lat" name="lat"
                        value="45.782">
                    <label for="lon">Longitude</label> <input type="text" id="lon" name="lon" value="4.8656">
                    <label for="zoom">Zoom<span id="zoomValue"></span></label> <input type="range" id="zoom" name="zoom"
                        min="1" max="21" value="15">
                </fieldset>
            </form>
        </div>
    </section>

    <section>
        <h2>Carte</h2>
        <div class="content">
        </div>
        <div id="map"></div>
        <br />
    </section>

    <section>
        <h2>Zone à Régime Restreint (ZRR)</h2>
        <div class="content">
            <form id="setCorner1" onsubmit="return false;" class="pure-form">
                <fieldset>
                    <label for="lat1" class="first">Lattitude </label> <input type="text" id="lat1"
                        name="lat1">&nbsp;&nbsp;
                    <label for="lon1">Longitude</label> <input type="text" id="lon1" name="lon1">
                </fieldset>
                <fieldset>
                    <label for="lat2" class="first">Lattitude </label> <input type="text" id="lat2"
                        name="lat2">&nbsp;&nbsp;
                    <label for="lon2">Longitude</label> <input type="text" id="lon2" name="lon2">
                </fieldset>
                <fieldset>
                    <label for="sendZrr" class="first">Visualiser ZRR</label>&nbsp;&nbsp;
                    <button class="pure-button pure-button-active" id="setZrrButton">Set</button>&nbsp;&nbsp;
                    <label for="sendZrr">Envoyer les coordonnées de la ZRR au serveur</label>&nbsp;&nbsp;
                    <button class="pure-button pure-button-active" id="sendZrrButton">Send</button>
                </fieldset>
            </form>
        </div>
    </section>
    <section>
        <h2>Gestion des Équipages</h2>
        <div class="content">
            <label class="first">Agent :</label>
            <select id="playerLogin">
                <option value="">-- Sélectionner un agent --</option>
            </select>
            <label>Affectation :</label>
            <select id="playerRole">
                <option value="explorateur">Explorateur</option>
                <option value="rival">Rival</option>
            </select>
            <button id="setRoleButton">Assigner le Rôle</button>
        </div>
    </section>

    <section>
        <h2>Ressources & État du Monde</h2>
        <div class="content">
            <label class="first" for="objectType">Type :</label>
            <select id="objectType">
                <option value="artefact">💎 Artefact</option>
                <option value="creature">👹 Créature</option>
                <option value="tresor">💰 Trésor</option>
                <option value="inconnu">❓ Inconnu / Autre</option>
            </select>
            <button id="spawnObjectButton">Déployer sur coordonnées</button>
            <hr style="border: 0; border-top: 1px solid #535C4A; margin: 15px 0;">
            <div id="gameStatusDisplay" style="margin-bottom: 10px;">
                <strong>Statut :</strong> Non chargé
            </div>
            <button id="refreshStatusButton">Actualiser les données</button>
        </div>
    </section>

    <section>
        <h2>Paramètres de Traque</h2>
        <div class="content">
            <form id="setTtl" onsubmit="return false;" class="pure-form">
                <label for="ttl" class="first">TTL par défaut (sec)</label>
                <input type="number" min="0" max="180" value="60" id="ttl" name="ttl">
                <button id="setTtlButton" class="pure-button">Mettre à jour</button>
            </form>
        </div>
    </section>

    <section>
        <div class="content">
            <p><strong>Credits:</strong> Fonts by
                <span style="font-family: _h1_"><a href="https://fonts.google.com/specimen/Paytone+One">Paytone
                        One</a></span>,
                <span style="font-family: _h2_"><a href="https://www.fontsquirrel.com/fonts/forum">Forum</a></span> and
                <span style="font-family: _normal_"><a href="https://www.fontsquirrel.com/fonts/roboto-slab">Roboto
                        Slab</a></span>.
            </p>
        </div>
    </section>
</body>

</html>
