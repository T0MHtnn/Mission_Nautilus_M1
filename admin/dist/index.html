<!doctype html><html lang="fr"><head><meta charset="UTF-8"><title>Mission Nautilus - Confidentiel</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css" integrity="sha384-X38yfunGUhNzHpBaEBsWLO+A0HDYOQi8ufWDkZ0k9e0eXz/tH3II7uKZ9msv++Ls" crossorigin="anonymous"><meta name="viewport" content="width=device-width,initial-scale=1"><script defer="defer" src="main.js"></script><link href="main.css" rel="stylesheet"></head><body class="b"><header><h1>Mission Nautilus</h1><h1 class="elanor">Confidentiel</h1></header><section><h2>Position</h2><div class="content"><form onsubmit="return!1" class="pure-form"><fieldset style="display:flow-root"><label for="lat" class="first">Lattitude</label> <input id="lat" name="lat" value="45.782"> <label for="lon">Longitude</label> <input id="lon" name="lon" value="4.8656"> <label for="zoom">Zoom<span id="zoomValue"></span></label> <input type="range" id="zoom" name="zoom" min="1" max="21" value="15"></fieldset></form></div></section><section><h2>Carte</h2><div class="content"></div><div id="map"></div><br/></section><section><h2>ZRR</h2><div class="content"><form id="setCorner1" onsubmit="return!1" class="pure-form"><fieldset><label for="lat1" class="first">Lattitude</label> <input id="lat1" name="lat1">&nbsp;&nbsp; <label for="lon1">Longitude</label> <input id="lon1" name="lon1"></fieldset><fieldset><label for="lat2" class="first">Lattitude</label> <input id="lat2" name="lat2">&nbsp;&nbsp; <label for="lon2">Longitude</label> <input id="lon2" name="lon2"></fieldset><fieldset><label for="sendZrr" class="first">Définir les limites de la ZRR ></label>&nbsp;&nbsp; <button class="pure-button pure-button-active" id="setZrrButton">Set</button>&nbsp;&nbsp; <label for="sendZrr">Envoyer les coordonnées de la ZRR ></label>&nbsp;&nbsp; <button class="pure-button pure-button-active" id="sendZrrButton">Send</button></fieldset></form></div></section><section><h2>Paramètres</h2><div class="content"><form id="setTtl" onsubmit="return!1" class="pure-form"><fieldset><label for="ttl" class="first">Temps de Traque et de Localisation (TTL) par défaut</label> <input type="number" min="0" max="180" value="60" id="ttl" name="ttl">&nbsp;&nbsp; <button id="setTtlButton" class="pure-button pure-button-active">Set</button></fieldset></form></div></section><section><div class="content"><p><strong>Credits:</strong> Fonts by <span style="font-family:_h1_"><a href="https://fonts.google.com/specimen/Paytone+One">Paytone One</a></span>, <span style="font-family:_h2_"><a href="https://www.fontsquirrel.com/fonts/forum">Forum</a></span> and <span style="font-family:_normal_"><a href="https://www.fontsquirrel.com/fonts/roboto-slab">Roboto Slab</a></span>.</p></div></section></body></html>
