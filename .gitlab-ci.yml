image: node:24-alpine

stages:
  - build_test
  - deploy

# --- PARTIE API ---

test-api:
  stage: build_test
  script:
    - cd API
    - npm install
    - npx eslint .
    - npm test

# --- PARTIE ADMIN (TP3) ---

build-admin:
  stage: build_test
  script:
    - cd admin
    - npm install
    - npm run build # Génère le dossier admin/dist/
  artifacts:
    paths:
      - admin/dist/
    expire_in: 1 hour
  only:
    - main

# --- PARTIE CLIENT VUE (TP4) ---

build-tp4:
  stage: build_test
  script:
    - cd client
    - npm install
    - npm run lint     # Validation ESLint (Étape 4 de ton sujet)
    - npm run build    # Génère le dossier client/dist/
  artifacts:
    paths:
      - client/dist/
    expire_in: 1 hour
  only:
    - main

# --- DÉPLOIEMENT GLOBAL ---

deploy-all:
  stage: deploy
  before_script:
    - apk add --no-cache rsync openssh-client
    - eval $(ssh-agent -s)
    # On s'assure que la clé finit par un saut de ligne pour éviter l'erreur libcrypto
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > /tmp/id_rsa
    - chmod 600 /tmp/id_rsa
    - ssh-add /tmp/id_rsa
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan 192.168.75.88 >> ~/.ssh/known_hosts
  script:
    - echo "Déploiement en cours..."
    # On force rsync à utiliser la clé ajoutée sans vérification d'hôte stricte
    - rsync -avz -e "ssh -o StrictHostKeyChecking=no" admin/dist/ p2308972@192.168.75.88:/var/www/html/admin/
    - rsync -avz -e "ssh -o StrictHostKeyChecking=no" client/dist/ p2308972@192.168.75.88:/var/www/html/tp4/
    
    # Pour l'API Node, on s'assure d'utiliser le bon chemin
    - rsync -avz -e "ssh -o StrictHostKeyChecking=no" API/ p2308972@192.168.75.88:/home/p2308972/api-node/
    - ssh -o StrictHostKeyChecking=no p2308972@192.168.75.88 "cd /home/p2308972/api-node && npm install && pm2 restart all || pm2 start server.js"
  only:
    - main