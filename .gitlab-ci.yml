image: node:24-alpine

stages:
  - build_test
  - deploy

# --- ÉTAPE 1 : TESTS ET BUILDS (Inchangé, c'est OK) ---
test-api:
  stage: build_test
  script:
    - cd API
    - npm install
    - npx eslint . || true
  only:
    - main

build-admin:
  stage: build_test
  script:
    - cd admin
    - npm install
    - npm run build
  artifacts:
    paths:
      - admin/dist/
    expire_in: 1 hour
  only:
    - main

build-tp4:
  stage: build_test
  script:
    - cd client
    - npm install
    - npm run build
  artifacts:
    paths:
      - client/dist/
    expire_in: 1 hour
  only:
    - main

# --- ÉTAPE 2 : DÉPLOIEMENT ---

deploy-all:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache rsync openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config

  script:
    # 1. Création forcée du dossier admin sur la VM (au cas où)
    - ssh gitlabci@192.168.75.88 "mkdir -p /var/www/html/admin"

    # 2. Déploiement du client Vue (TP4) à la RACINE d'abord
    # On utilise --exclude 'admin/' pour que rsync ne touche PAS au dossier admin
    - echo "Déploiement du client Vue à la racine..."
    - rsync -avz --delete --exclude 'admin/' client/dist/ gitlabci@192.168.75.88:/var/www/html/

    # 3. Déploiement du client Admin (TP3) dans son SOUS-DOSSIER ensuite
    - echo "Déploiement du client Admin dans /admin/..."
    - rsync -avz --delete admin/dist/ gitlabci@192.168.75.88:/var/www/html/admin/
    
    # 4. Déploiement de l'API Node.js
    - echo "Déploiement de l'API Express..."
    - rsync -avz --no-t --delete --exclude 'node_modules' API/ gitlabci@192.168.75.88:/opt/express/
    - ssh gitlabci@192.168.75.88 "cd /opt/express && npm install --production && (pm2 restart zanzibar-api || pm2 start index.js --name zanzibar-api)"

  only:
    - main