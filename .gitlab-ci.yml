image: node:24-alpine

stages:
  - build_test
  - deploy

# Résoudre les problèmes réseau (ECONNRESET) sur le runner CI
before_script:
  - npm config set fetch-retries 5
  - npm config set fetch-retry-mintimeout 20000
  - npm config set fetch-retry-maxtimeout 120000

# --- PARTIE API ---
test-api:
  stage: build_test
  script:
    - cd API
    - npm install
    - npx eslint .
    - npm test

# --- PARTIE ADMIN (TP3) ---
build-admin:
  stage: build_test
  script:
    - cd admin
    - npm install
    - npm run build
  artifacts:
    paths:
      - admin/dist/
    expire_in: 1 hour
  only:
    - main

# --- PARTIE CLIENT VUE (TP4) ---
build-tp4:
  stage: build_test
  script:
    - cd client
    - npm install
    - npm run lint
    - npm run build
  artifacts:
    paths:
      - client/dist/
    expire_in: 1 hour
  only:
    - main

# --- DÉPLOIEMENT GLOBAL ---
deploy-all:
  stage: deploy
  before_script:
    - apk add --no-cache rsync openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > /tmp/id_rsa
    - chmod 600 /tmp/id_rsa
    - ssh-add /tmp/id_rsa
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan 192.168.75.88 >> ~/.ssh/known_hosts
  script:
    - echo "Déploiement avec forçage des algorithmes RSA..."
    # Définition des options de compatibilité pour les vieux serveurs SSH
    - export SSH_OPTS="-o StrictHostKeyChecking=no -o PubkeyAcceptedAlgorithms=+ssh-rsa -o HostKeyAlgorithms=+ssh-rsa"

    # 1. Déploiement Admin (TP3) -> /var/www/html/admin/
    - rsync -avz -e "ssh $SSH_OPTS" admin/dist/ p2308972@192.168.75.88:/var/www/html/admin/
    - ssh $SSH_OPTS p2308972@192.168.75.88 "chmod -R 755 /var/www/html/admin/"

    # 2. Déploiement Client Vue (TP4) -> /var/www/html/tp4/
    - rsync -avz -e "ssh $SSH_OPTS" client/dist/ p2308972@192.168.75.88:/var/www/html/tp4/
    - ssh $SSH_OPTS p2308972@192.168.75.88 "chmod -R 755 /var/www/html/tp4/"

    # 3. Déploiement API Node -> /home/p2308972/api-node/
    - rsync -avz -e "ssh $SSH_OPTS" API/ p2308972@192.168.75.88:/home/p2308972/api-node/
    - ssh $SSH_OPTS p2308972@192.168.75.88 "chmod -R 755 /home/p2308972/api-node/ && cd /home/p2308972/api-node && npm install && pm2 restart all || pm2 start server.js"

  only:
    - main