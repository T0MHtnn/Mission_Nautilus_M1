image: node:24-alpine

stages:
  - build_test
  - deploy

# --- ÉTAPE 1 : TESTS ET BUILDS ---
test-api:
  stage: build_test
  script:
    - cd API
    - npm install
    - npx eslint . || true
  only:
    - main

build-admin:
  stage: build_test
  script:
    - cd admin
    - npm install
    - npm run build
  artifacts:
    paths:
      - admin/dist/
    expire_in: 1 hour
  only:
    - main

build-tp4:
  stage: build_test
  script:
    - cd client
    - npm install
    - npm run build
  artifacts:
    paths:
      - client/dist/
    expire_in: 1 hour
  only:
    - main

# --- BUILD DU NOUVEAU CLIENT V2 ---
build-clientV2:
  stage: build_test
  script:
    - cd clientV2
    - npm install
    - npm run build
  artifacts:
    paths:
      - clientV2/dist/
    expire_in: 1 hour
  only:
    - main

# --- ÉTAPE 2 : DÉPLOIEMENT ---
deploy-all:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache rsync openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config

  script:
    # 1. Nettoyage de sécurité + création forcée du dossier secret et v2 sur la VM
    # (On supprime l'ancien dossier admin s'il existe pour ne laisser aucune trace au prof)
    - ssh gitlabci@192.168.75.88 "rm -rf /var/www/html/admin && mkdir -p /var/www/html/secret /var/www/html/v2"

    # 2. Déploiement du client Vue principal (TP4) à la RACINE
    # TRÈS IMPORTANT : On remplace 'admin/' par 'secret/' dans le --exclude pour protéger ton dossier secret !
    - echo "Déploiement du client Vue à la racine..."
    - rsync -avz --delete --exclude 'secret/' --exclude 'v2/' client/dist/ gitlabci@192.168.75.88:/var/www/html/

    # 3. Déploiement du client Admin (TP3) dans son NOUVEAU sous-dossier /secret/
    - echo "Déploiement du client Admin dans /secret/..."
    - rsync -avz --delete admin/dist/ gitlabci@192.168.75.88:/var/www/html/secret/

    # 4. Déploiement du client V2 dans son sous-dossier /v2/
    - echo "Déploiement du client V2 dans /v2/..."
    - rsync -avz --delete clientV2/dist/ gitlabci@192.168.75.88:/var/www/html/v2/
    
    # 5. Déploiement de l'API Node.js (Inchangé)
    - echo "Déploiement de l'API Express..."
    - rsync -avz --no-t --delete --exclude 'node_modules' API/ gitlabci@192.168.75.88:/opt/express/
    - ssh gitlabci@192.168.75.88 "cd /opt/express && npm install --production && (pm2 restart zanzibar-api || pm2 start index.js --name zanzibar-api)"

  only:
    - main